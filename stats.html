<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<h2>統計</h2>

<div id="stats"></div>

<script src="./script.js"></script>
<script>
const b = getBattles();

const wins = b.filter(x => x.result === "win").length;
const kills = b.reduce((a,c)=>a+c.kills,0);
const deaths = b.reduce((a,c)=>a+c.deaths,0);

document.getElementById("stats").innerHTML = `
  <div>試合数: ${b.length}</div>
  <div>勝率: ${(wins/b.length*100 || 0).toFixed(1)}%</div>
  <div>K/D: ${(kills/deaths || 0).toFixed(2)}</div>
`;
</script>

</body>
</html>
