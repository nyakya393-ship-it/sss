<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<div id="detail"></div>

<script src="./script.js"></script>
<script>
const id = new URLSearchParams(location.search).get("id");
const b = getBattleById(id);

document.getElementById("detail").innerHTML = `
  <div class="detail ${b.result}">
    <h1>${b.result}</h1>
    <h2>${b.stage}</h2>
    <h3>${b.weapon}</h3>

    <div>${b.sub} / ${b.special}</div>
    <div>K ${b.kills} / D ${b.deaths}</div>
    <div>Paint ${b.paint}</div>
  </div>
`;
</script>

</body>
</html>
